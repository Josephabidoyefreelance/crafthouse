<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Crafthouse Kitchen</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <style>
    * { box-sizing: border-box; }
    body { background: #F0F0EE; margin: 0; font-family: var(--font-body); }

    /* SIDEBAR */
    .admin-sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: var(--black);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo img { height: 40px; filter: brightness(0) invert(1); }
    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 20px 20px 8px;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      text-decoration: none;
    }
    .sidebar-link:hover, .sidebar-link.active {
      background: rgba(184,147,63,0.12);
      color: var(--gold-light);
    }
    .sidebar-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    /* MAIN */
    .admin-main {
      margin-left: 240px;
      min-height: 100vh;
    }
    .admin-topbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--black); }
    .admin-content { padding: 32px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: white;
      border: 1px solid var(--border);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon svg { width: 22px; height: 22px; }
    .stat-num { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--black); line-height: 1; }
    .stat-label { font-size: 12px; color: var(--mid); margin-top: 4px; font-weight: 500; }

    /* PANELS */
    .panel { background: white; border: 1px solid var(--border); margin-bottom: 24px; }
    .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--black); }
    .panel-body { padding: 24px; }

    /* UPLOAD */
    .upload-zone {
      border: 2px dashed var(--border);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg);
      border-radius: 4px;
      margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--gold);
      background: rgba(184,147,63,0.04);
    }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid var(--border);
      overflow: hidden;
      border-radius: 2px;
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-remove {
      position: absolute;
      top: 3px; right: 3px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .preview-main-badge {
      position: absolute;
      bottom: 3px; left: 3px;
      background: var(--gold);
      color: white;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 4px;
      letter-spacing: 0.5px;
    }

    /* PRODUCT LIST */
    .product-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .product-row:last-child { border-bottom: none; }
    .product-row img { width: 60px; height: 48px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
    .product-row-info { flex: 1; min-width: 0; }
    .product-row-name { font-size: 14px; font-weight: 600; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-row-meta { font-size: 12px; color: var(--mid); margin-top: 2px; }

    /* ORDERS */
    .order-row {
      display: grid;
      grid-template-columns: 100px 1fr auto auto;
      gap: 16px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .order-row:last-child { border-bottom: none; }
    .order-id { font-weight: 700; color: var(--gold); font-family: var(--font-display); }
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .status-confirmed { background: rgba(46,125,50,0.1); color: #2E7D32; }
    .status-pending { background: rgba(245,127,23,0.1); color: #F57F17; }

    /* TABS */
    .tab-bar { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    .tab-btn {
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mid);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* SEARCH */
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      min-width: 200px;
      border: 1.5px solid var(--border);
      padding: 9px 16px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .search-bar input:focus { border-color: var(--gold); }

    @media (max-width: 900px) {
      .admin-sidebar { width: 200px; }
      .admin-main { margin-left: 200px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .admin-sidebar { display: none; }
      .admin-main { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="admin-sidebar">
  <div class="sidebar-logo">
    <img src="/images/logo.png" alt="Crafthouse">
    <div style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:6px;text-transform:uppercase">Admin Panel</div>
  </div>

  <div class="sidebar-label">Main</div>
  <button class="sidebar-link active" id="nav-overview" onclick="showSection('overview')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Overview
  </button>

  <div class="sidebar-label">Catalogue</div>
  <button class="sidebar-link" id="nav-add" onclick="showSection('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Product
  </button>
  <button class="sidebar-link" id="nav-products" onclick="showSection('products')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
    All Products
  </button>

  <div class="sidebar-label">Sales</div>
  <button class="sidebar-link" id="nav-orders" onclick="showSection('orders')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Orders
  </button>

  <div class="sidebar-footer">
    <a href="/" target="_blank" class="sidebar-link" style="margin-bottom:4px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View Website
    </a>
    <a href="/admin/logout" class="sidebar-link" style="color:rgba(198,40,40,0.7)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </a>
  </div>
</div>

<!-- MAIN -->
<div class="admin-main">
  <div class="admin-topbar">
    <div class="topbar-title" id="topbar-title">Overview</div>
    <div style="display:flex;align-items:center;gap:12px;font-size:13px;color:var(--mid)">
      <div style="width:8px;height:8px;background:#2E7D32;border-radius:50%"></div>
      Admin
    </div>
  </div>

  <div class="admin-content">

    <!-- OVERVIEW -->
    <div id="section-overview">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(184,147,63,0.1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="#B8933F" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
          </div>
          <div>
            <div class="stat-num" id="stat-products">—</div>
            <div class="stat-label">Total Products</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(46,125,50,0.1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          </div>
          <div>
            <div class="stat-num" id="stat-orders">—</div>
            <div class="stat-label">Total Orders</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(21,101,192,0.1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div>
            <div class="stat-num" id="stat-revenue">—</div>
            <div class="stat-label">Total Revenue</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(123,31,162,0.1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7B1FA2" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <div class="stat-num" id="stat-categories">—</div>
            <div class="stat-label">Categories</div>
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Recent Orders</div>
            <button class="btn btn-sm btn-outline" onclick="showSection('orders')">View All</button>
          </div>
          <div class="panel-body" id="recent-orders-list" style="padding:0 24px"></div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Recent Products</div>
            <button class="btn btn-sm btn-outline" onclick="showSection('add')">Add New</button>
          </div>
          <div class="panel-body" id="recent-products-list" style="padding:0 24px"></div>
        </div>
      </div>
    </div>

    <!-- ADD PRODUCT -->
    <div id="section-add" style="display:none">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Add New Product</div>
        </div>
        <div class="panel-body">
          <div id="add-success" style="display:none;background:rgba(46,125,50,0.08);border:1px solid rgba(46,125,50,0.3);padding:16px;margin-bottom:20px;color:#2E7D32;border-radius:2px"></div>
          <div id="add-error" style="display:none;background:rgba(198,40,40,0.08);border:1px solid rgba(198,40,40,0.3);padding:16px;margin-bottom:20px;color:#C62828;border-radius:2px"></div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="form-field">
              <label class="form-label">Product Name *</label>
              <input class="form-input" type="text" id="p-name" placeholder="e.g. 90cm Vertical Hood Black">
            </div>
            <div class="form-field">
              <label class="form-label">Price (₦) *</label>
              <input class="form-input" type="number" id="p-price" placeholder="e.g. 475000">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="form-field">
              <label class="form-label">Category *</label>
              <select class="form-input" id="p-category">
                <option value="">Select category</option>
                <option>Cooker Hoods</option>
                <option>Cookers</option>
                <option>Hobs</option>
                <option>Ovens</option>
                <option>Microwaves</option>
                <option>Dishwashers</option>
                <option>Refrigeration</option>
                <option>Sinks</option>
                <option>Kitchen Taps</option>
                <option>Storage & Organizers</option>
                <option>Handles & Accessories</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label">Subcategory</label>
              <input class="form-input" type="text" id="p-sub" placeholder="e.g. 90cm Hoods">
            </div>
          </div>
          <div class="form-field">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" id="p-desc" placeholder="Product description..." style="min-height:80px"></textarea>
          </div>
          <div class="form-field">
            <label class="form-label">Badge</label>
            <select class="form-input" id="p-badge" style="max-width:220px">
              <option value="">None</option>
              <option>New</option><option>Best Seller</option><option>Popular</option>
              <option>Trending</option><option>Value</option><option>Premium</option>
              <option>Flagship</option><option>Elite</option><option>Professional</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Product Images * (up to 10, first = main photo)</label>
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('img-input').click()">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 10px;display:block;color:var(--mid)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <p style="font-size:14px;font-weight:600;color:var(--black);margin:0 0 4px">Click to upload or drag & drop</p>
              <p style="font-size:12px;color:var(--mid);margin:0">JPG, PNG, WEBP — Max 10MB each — Up to 10 images</p>
            </div>
            <input type="file" id="img-input" multiple accept="image/*" style="display:none" onchange="addFiles(Array.from(this.files));this.value=''">
            <div class="preview-grid" id="preview-grid"></div>
          </div>
          <div style="display:flex;gap:12px;margin-top:8px">
            <button class="btn btn-gold" onclick="submitProduct()" id="submit-btn">Add Product</button>
            <button class="btn btn-outline" onclick="resetForm()">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ALL PRODUCTS -->
    <div id="section-products" style="display:none">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">All Products</div>
          <button class="btn btn-gold btn-sm" onclick="showSection('add')">+ Add Product</button>
        </div>
        <div class="panel-body">
          <div class="search-bar">
            <input type="text" id="product-search" placeholder="Search by name, SKU, or category..." oninput="filterProducts()">
            <select class="form-input" id="product-cat-filter" onchange="filterProducts()" style="max-width:180px;padding:9px 16px">
              <option value="">All Categories</option>
              <option>Cooker Hoods</option><option>Cookers</option><option>Hobs</option>
              <option>Ovens</option><option>Microwaves</option><option>Dishwashers</option>
              <option>Refrigeration</option><option>Sinks</option><option>Kitchen Taps</option>
              <option>Storage & Organizers</option><option>Handles & Accessories</option>
            </select>
          </div>
          <div id="products-list"></div>
        </div>
      </div>
    </div>

    <!-- ORDERS -->
    <div id="section-orders" style="display:none">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">All Orders</div>
          <span id="orders-count" style="font-size:13px;color:var(--mid)"></span>
        </div>
        <div class="panel-body" id="orders-list"></div>
      </div>
    </div>

  </div>
</div>

<script>
  let allProducts = [];
  let allOrders = [];
  let selectedFiles = [];

  // ==================
  // NAVIGATION
  // ==================
  function showSection(name) {
    ['overview','add','products','orders'].forEach(s => {
      document.getElementById('section-' + s).style.display = s === name ? 'block' : 'none';
      const nav = document.getElementById('nav-' + s);
      if (nav) nav.classList.toggle('active', s === name);
    });
    const titles = { overview:'Overview', add:'Add Product', products:'All Products', orders:'Orders' };
    document.getElementById('topbar-title').textContent = titles[name] || name;
    if (name === 'products') loadProducts();
    if (name === 'orders') loadOrders();
    if (name === 'overview') loadOverview();
  }

  // ==================
  // OVERVIEW
  // ==================
  async function loadOverview() {
    const [prodRes, ordRes] = await Promise.all([
      fetch('/api/products?limit=200'),
      fetch('/api/orders/all').catch(() => null)
    ]);
    const prodData = await prodRes.json();
    allProducts = prodData.products || [];

    document.getElementById('stat-products').textContent = prodData.total;
    document.getElementById('stat-categories').textContent = [...new Set(allProducts.map(p => p.category))].length;

    // Orders from localStorage fallback
    const orders = JSON.parse(localStorage.getItem('admin_orders_cache') || '[]');
    document.getElementById('stat-orders').textContent = orders.length;

    const revenue = orders.reduce((s, o) => s + (o.total || 0), 0);
    document.getElementById('stat-revenue').textContent = revenue > 0 ? '₦' + revenue.toLocaleString('en-NG') : '₦0';

    // Recent products
    const recent = allProducts.slice(-5).reverse();
    document.getElementById('recent-products-list').innerHTML = recent.length
      ? recent.map(p => `
          <div class="product-row">
            <img src="${p.image}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=100'">
            <div class="product-row-info">
              <div class="product-row-name">${p.name}</div>
              <div class="product-row-meta">SKU: ${p.sku} | ₦${p.price.toLocaleString('en-NG')}</div>
            </div>
          </div>`).join('')
      : '<p style="color:var(--mid);padding:16px 0">No products yet.</p>';

    // Recent orders
    const recentOrders = orders.slice(-5).reverse();
    document.getElementById('recent-orders-list').innerHTML = recentOrders.length
      ? recentOrders.map(o => `
          <div class="order-row">
            <span class="order-id">#${o.id}</span>
            <span>${o.customer.firstName} ${o.customer.lastName}</span>
            <span>₦${(o.total||0).toLocaleString('en-NG')}</span>
            <span class="status-badge status-confirmed">${o.status}</span>
          </div>`).join('')
      : '<p style="color:var(--mid);padding:16px 0">No orders yet.</p>';
  }

  // ==================
  // PRODUCTS
  // ==================
  async function loadProducts() {
    const res = await fetch('/api/products?limit=200');
    const data = await res.json();
    allProducts = data.products || [];
    renderProducts(allProducts);
  }

  function filterProducts() {
    const q = document.getElementById('product-search').value.toLowerCase();
    const cat = document.getElementById('product-cat-filter').value;
    const filtered = allProducts.filter(p => {
      const matchQ = !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
      const matchCat = !cat || p.category === cat;
      return matchQ && matchCat;
    });
    renderProducts(filtered);
  }

  function renderProducts(products) {
    const list = document.getElementById('products-list');
    if (!products.length) { list.innerHTML = '<p style="color:var(--mid);text-align:center;padding:40px">No products found.</p>'; return; }
    list.innerHTML = products.map(p => `
      <div class="product-row">
        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=100'">
        <div class="product-row-info">
          <div class="product-row-name">${p.name}</div>
          <div class="product-row-meta">
            SKU: ${p.sku} | ${p.category}${p.subcategory ? ' / '+p.subcategory : ''} | ₦${p.price.toLocaleString('en-NG')}
            ${p.images && p.images.length > 1 ? ' | <span style="color:var(--gold)">' + p.images.length + ' images</span>' : ''}
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <a href="/product/${p.id}" target="_blank" class="btn btn-outline btn-sm">View</a>
          <button class="btn btn-sm" style="background:rgba(198,40,40,0.08);color:#C62828;border:1px solid rgba(198,40,40,0.2)" onclick="deleteProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')">Delete</button>
        </div>
      </div>`).join('');
  }

  async function deleteProduct(id, name) {
    if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
    await fetch('/api/products/' + id, { method: 'DELETE' });
    showToastAdmin('Product deleted.');
    loadProducts();
    loadOverview();
  }

  // ==================
  // ORDERS
  // ==================
  async function loadOrders() {
    const res = await fetch('/api/orders-all');
    if (!res.ok) {
      document.getElementById('orders-list').innerHTML = '<p style="color:var(--mid)">No orders yet.</p>';
      return;
    }
    allOrders = await res.json();
    localStorage.setItem('admin_orders_cache', JSON.stringify(allOrders));
    renderOrders(allOrders);
  }

  function renderOrders(orders) {
    document.getElementById('orders-count').textContent = orders.length + ' orders';
    const list = document.getElementById('orders-list');
    if (!orders.length) { list.innerHTML = '<p style="color:var(--mid);text-align:center;padding:40px">No orders yet.</p>'; return; }

    list.innerHTML = [...orders].reverse().map(o => `
      <div style="border:1px solid var(--border);padding:20px;margin-bottom:12px;background:var(--bg)">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px">
          <div>
            <span class="order-id" style="font-size:18px">#${o.id}</span>
            <span class="status-badge status-confirmed" style="margin-left:10px">${o.status}</span>
          </div>
          <div style="font-size:12px;color:var(--mid)">${new Date(o.createdAt).toLocaleString('en-NG')}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;margin-bottom:12px">
          <div>
            <div style="font-weight:600;color:var(--black)">${o.customer.firstName} ${o.customer.lastName}</div>
            <div style="color:var(--mid)">${o.customer.phone}</div>
            <div style="color:var(--mid)">${o.customer.email}</div>
          </div>
          <div>
            <div style="color:var(--mid)">${o.customer.address}</div>
            <div style="color:var(--mid)">${o.customer.city}, ${o.customer.state}</div>
            <div style="color:var(--mid);margin-top:4px">Payment: <strong>${o.paymentMethod}</strong></div>
          </div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:12px">
          ${o.items.map(i => '<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0"><span>' + i.name + ' x' + i.qty + '</span><span style="font-weight:600">₦' + (i.price*i.qty).toLocaleString('en-NG') + '</span></div>').join('')}
          <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:var(--black);padding-top:8px;margin-top:4px;border-top:1px solid var(--border)">
            <span>Total</span>
            <span style="color:var(--gold)">₦${o.total.toLocaleString('en-NG')}</span>
          </div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <a href="https://wa.me/2348058262947?text=Order%20%23${o.id}%20from%20${encodeURIComponent(o.customer.firstName + ' ' + o.customer.lastName)}" target="_blank" class="btn btn-sm" style="background:#25D366;color:white;border:none">
            📱 WhatsApp Customer
          </a>
          <a href="mailto:${o.customer.email}?subject=Your Order %23${o.id}" class="btn btn-sm btn-outline">✉️ Email Customer</a>
        </div>
      </div>`).join('');
  }

  // ==================
  // UPLOAD
  // ==================
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'))); });

  function addFiles(files) {
    selectedFiles = selectedFiles.concat(files).slice(0, 10);
    renderPreviews();
  }

  function removeFile(i) { selectedFiles.splice(i, 1); renderPreviews(); }

  function renderPreviews() {
    const grid = document.getElementById('preview-grid');
    if (!selectedFiles.length) { grid.innerHTML = ''; return; }
    grid.innerHTML = selectedFiles.map((f, i) =>
      '<div class="preview-item">' +
      '<img src="' + URL.createObjectURL(f) + '" alt="preview">' +
      '<button class="preview-remove" onclick="removeFile(' + i + ')">&times;</button>' +
      (i===0 ? '<span class="preview-main-badge">MAIN</span>' : '') +
      '</div>'
    ).join('');
  }

  async function submitProduct() {
    const name = document.getElementById('p-name').value.trim();
    const price = document.getElementById('p-price').value.trim();
    const category = document.getElementById('p-category').value;
    const errEl = document.getElementById('add-error');
    const successEl = document.getElementById('add-success');
    errEl.style.display = 'none'; successEl.style.display = 'none';

    if (!name || !price || !category) { errEl.textContent = 'Name, price and category are required.'; errEl.style.display = 'block'; return; }
    if (!selectedFiles.length) { errEl.textContent = 'Please upload at least one product image.'; errEl.style.display = 'block'; return; }

    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Uploading...'; btn.disabled = true;

    const fd = new FormData();
    fd.append('name', name);
    fd.append('price', price);
    fd.append('category', category);
    fd.append('subcategory', document.getElementById('p-sub').value.trim());
    fd.append('description', document.getElementById('p-desc').value.trim());
    fd.append('badge', document.getElementById('p-badge').value);
    selectedFiles.forEach(f => fd.append('images', f));

    try {
      const res = await fetch('/api/products', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        successEl.innerHTML = '✅ Product added! <strong>SKU: ' + data.product.sku + '</strong> — "' + data.product.name + '"';
        successEl.style.display = 'block';
        resetForm();
      } else {
        errEl.textContent = data.error || 'Failed to add product.';
        errEl.style.display = 'block';
      }
    } catch (e) {
      errEl.textContent = 'Network error. Please try again.';
      errEl.style.display = 'block';
    }
    btn.textContent = 'Add Product'; btn.disabled = false;
  }

  function resetForm() {
    ['p-name','p-price','p-sub','p-desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('p-category').value = '';
    document.getElementById('p-badge').value = '';
    selectedFiles = []; renderPreviews();
  }

  function showToastAdmin(msg) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1A1A1A;color:white;padding:14px 20px;border-left:4px solid #B8933F;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2)';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // Load overview on start
  loadOverview();
</script>
</body>
</html>
