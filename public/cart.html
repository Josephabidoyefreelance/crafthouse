<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Crafthouse Kitchen</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
  <div id="nav-mount"></div>

  <div class="container section">
    <div class="breadcrumb">
      <a href="/">Home</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span>Cart</span>
    </div>

    <h1 style="font-family:var(--font-display);font-size:40px;font-weight:600;margin-bottom:40px">Your Cart</h1>

    <div id="cart-content">
      <div style="text-align:center;padding:60px"><div class="loading-spinner" style="display:block;margin:0 auto"></div></div>
    </div>
  </div>

  <div id="footer-mount"></div>

  <script src="/js/layout.js"></script>
  <script src="/js/main.js"></script>
  <script>
    async function loadCart() {
      const res = await fetch('/api/cart');
      const data = await res.json();
      renderCart(data);
    }

    function renderCart({ cart, total, count }) {
      const el = document.getElementById('cart-content');

      if (!cart.length) {
        el.innerHTML = `
          <div class="empty-cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet.</p>
            <a href="/shop" class="btn btn-gold" style="margin-top:24px">Continue Shopping</a>
          </div>`;
        return;
      }

      el.innerHTML = `
        <div class="cart-layout">
          <div>
            <table class="cart-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th style="text-align:center">Quantity</th>
                  <th style="text-align:right">Price</th>
                  <th style="text-align:right">Total</th>
                </tr>
              </thead>
              <tbody id="cart-items">
                ${cart.map(item => `
                  <tr class="cart-item" id="item-${item.id}">
                    <td>
                      <div class="cart-item-product">
                        <img class="cart-item-img" src="${item.image}" alt="${item.name}">
                        <div>
                          <div class="cart-item-name"><a href="/product/${item.id}">${item.name}</a></div>
                          <div class="cart-item-sku">SKU: ${item.sku}</div>
                          <button class="cart-item-remove" onclick="removeItem(${item.id})">Remove</button>
                        </div>
                      </div>
                    </td>
                    <td class="cart-qty">
                      <div class="qty-control" style="margin:0 auto;display:inline-flex">
                        <button class="qty-btn" onclick="updateQty(${item.id}, ${item.qty - 1})">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
                        </button>
                        <input type="number" class="qty-input" style="width:48px" value="${item.qty}" min="1" onchange="updateQty(${item.id}, this.value)">
                        <button class="qty-btn" onclick="updateQty(${item.id}, ${item.qty + 1})">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                      </div>
                    </td>
                    <td class="cart-price">${formatPrice(item.price)}</td>
                    <td class="cart-price">${formatPrice(item.price * item.qty)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            <div style="display:flex;justify-content:space-between;margin-top:24px;padding-top:24px;border-top:1px solid var(--border)">
              <a href="/shop" class="btn btn-outline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                Continue Shopping
              </a>
              <button class="btn btn-outline" onclick="clearCart()">Clear Cart</button>
            </div>
          </div>
          <div class="cart-summary">
            <div class="cart-summary-title">Order Summary</div>
            <div class="summary-row">
              <span>Subtotal (${count} item${count !== 1 ? 's' : ''})</span>
              <span id="subtotal">${formatPrice(total)}</span>
            </div>
            <div class="summary-row">
              <span>Delivery</span>
              <span>${total >= 500000 ? '<span style="color:var(--success)">Free</span>' : formatPrice(15000)}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="cart-total">${formatPrice(total >= 500000 ? total : total + 15000)}</span>
            </div>
            ${total < 500000 ? `<p style="font-size:12px;color:var(--mid);margin-bottom:20px">Add ${formatPrice(500000 - total)} more for free delivery</p>` : ''}
            <a href="/checkout" class="btn btn-gold btn-full" style="margin-top:20px">
              Proceed to Checkout
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </a>
            <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-size:12px;color:var(--mid)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              Secure & encrypted checkout
            </div>
          </div>
        </div>`;
    }

    async function updateQty(productId, qty) {
      qty = parseInt(qty);
      if (qty < 1) { removeItem(productId); return; }
      const res = await fetch('/api/cart/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId, qty })
      });
      const data = await res.json();
      updateCartBadge(data.count);
      loadCart();
    }

    async function removeItem(productId) {
      const res = await fetch('/api/cart/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId })
      });
      const data = await res.json();
      updateCartBadge(data.count);
      showToast('Item removed from cart');
      loadCart();
    }

    async function clearCart() {
      await fetch('/api/cart/clear', { method: 'POST' });
      updateCartBadge(0);
      loadCart();
    }

    loadCart();
  </script>
</body>
</html>
