<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Crafthouse Kitchen</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <style>
    body { background: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo img { height: 56px; margin: 0 auto; }
    .login-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 600;
      color: var(--black);
      text-align: center;
      margin-bottom: 6px;
    }
    .login-sub { text-align: center; font-size: 13px; color: var(--mid); margin-bottom: 32px; }
    .demo-box {
      background: rgba(184,147,63,0.08);
      border: 1px solid rgba(184,147,63,0.3);
      padding: 14px 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--mid);
      line-height: 1.7;
    }
    .demo-box strong { color: var(--gold); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/images/logo.png" alt="Crafthouse Kitchen">
    </div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">Sign in to manage your store</p>

    <div class="demo-box">
      <strong>Demo Credentials:</strong><br>
      Username: <strong>admin</strong><br>
      Password: <strong>crafthouse2024</strong>
    </div>

    <div id="login-error" style="display:none;background:rgba(198,40,40,0.08);border:1px solid rgba(198,40,40,0.3);padding:14px;font-size:13px;color:#C62828;margin-bottom:20px"></div>

    <div class="form-field">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="admin" value="admin">
    </div>
    <div class="form-field" style="margin-bottom:24px">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>

    <button class="btn btn-gold btn-full btn-lg" onclick="login()" id="login-btn">
      Sign In to Admin Panel
    </button>

    <div style="text-align:center;margin-top:20px">
      <a href="/" style="font-size:13px;color:var(--mid)">← Back to Website</a>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin/dashboard';
        } else {
          errEl.textContent = data.error || 'Invalid credentials.';
          errEl.style.display = 'block';
          btn.textContent = 'Sign In to Admin Panel';
          btn.disabled = false;
        }
      } catch (e) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.textContent = 'Sign In to Admin Panel';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
