<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | Crafthouse Kitchen</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
  <div id="nav-mount"></div>

  <div class="page-hero">
    <div class="page-hero-content">
      <p class="section-eyebrow page-hero-eyebrow">Crafthouse Collection</p>
      <h1 class="page-hero-title" id="cat-title">Loading...</h1>
    </div>
  </div>

  <div class="container">
    <div class="breadcrumb">
      <a href="/">Home</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <a href="/shop">Shop</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span id="bc-cat">...</span>
    </div>

    <div class="shop-main-header">
      <div class="shop-results" id="results-count"></div>
      <div class="shop-sort">
        <label style="font-size:11px;letter-spacing:1px">Sort:</label>
        <select id="sort-select" onchange="handleSort(this.value)">
          <option value="">Relevance</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A-Z</option>
        </select>
      </div>
    </div>

    <div class="product-grid" id="product-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="footer-mount"></div>

  <script src="/js/layout.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const category = decodeURIComponent(window.location.pathname.split('/category/')[1] || '');
    let state = { sort: '', page: 1, limit: 12, totalPages: 1 };

    document.getElementById('cat-title').textContent = category;
    document.getElementById('bc-cat').textContent = category;
    document.title = category + ' | Crafthouse Kitchen';

    function productCardHTML(p) {
      return '<div class="product-card" onclick="window.location=\'/product/' + p.id + '\'">' +
        '<div class="product-card-img">' +
        '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy">' +
        (p.badge ? '<span class="product-badge">' + p.badge + '</span>' : '') +
        '<button class="product-card-quick" onclick="event.stopPropagation();addToCart(' + p.id + ')">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
        '</button></div>' +
        '<div class="product-card-body">' +
        '<div class="product-card-cat">' + (p.subcategory || p.category) + '</div>' +
        '<div class="product-card-name">' + p.name + '</div>' +
        '<div class="product-card-sku">SKU: ' + p.sku + '</div>' +
        '<div class="product-card-footer">' +
        '<span class="product-price">' + formatPrice(p.price) + '</span>' +
        '<button class="product-add-btn" onclick="event.stopPropagation();addToCart(' + p.id + ')">Add to Cart</button>' +
        '</div></div></div>';
    }

    async function loadProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0"><div class="loading-spinner" style="display:block;margin:0 auto"></div></div>';

      try {
        const q = new URLSearchParams({ category: category, sort: state.sort, page: state.page, limit: state.limit });
        const res = await fetch('/api/products?' + q.toString());
        if (!res.ok) throw new Error('Server error ' + res.status);
        const data = await res.json();
        state.totalPages = data.pages;

        document.getElementById('results-count').textContent = data.total + ' product' + (data.total !== 1 ? 's' : '') + ' in ' + category;

        if (!data.products.length) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--mid)"><p>No products found.</p><a href="/shop" class="btn btn-gold" style="margin-top:20px">View All</a></div>';
          return;
        }

        grid.innerHTML = data.products.map(productCardHTML).join('');
        renderPagination(data.page, data.pages);
      } catch (err) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--error)"><p>Failed to load products. Please refresh the page.</p><br><small>' + err.message + '</small></div>';
      }
    }

    function renderPagination(current, total) {
      const el = document.getElementById('pagination');
      if (total <= 1) { el.innerHTML = ''; return; }
      let html = '';
      if (current > 1) html += '<button class="page-btn" onclick="goPage(' + (current-1) + ')">&laquo;</button>';
      for (let i = 1; i <= total; i++) {
        html += '<button class="page-btn ' + (i===current?'active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
      }
      if (current < total) html += '<button class="page-btn" onclick="goPage(' + (current+1) + ')">&raquo;</button>';
      el.innerHTML = html;
    }

    function goPage(p) { state.page = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function handleSort(val) { state.sort = val; state.page = 1; loadProducts(); }

    loadProducts();
  </script>
</body>
</html>
