<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Crafthouse Kitchen</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
  <div id="nav-mount"></div>
  <div class="container section">
    <div class="breadcrumb">
      <a href="/">Home</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <a href="/cart">Cart</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span>Checkout</span>
    </div>
    <h1 style="font-family:var(--font-display);font-size:40px;font-weight:600;margin-bottom:40px">Checkout</h1>
    <div class="checkout-layout" id="checkout-content">
      <div style="text-align:center;padding:60px"><div class="loading-spinner" style="display:block;margin:0 auto"></div></div>
    </div>
  </div>
  <div id="footer-mount"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let cartData = null;

    async function loadCheckout() {
      const res = await fetch('/api/cart');
      cartData = await res.json();
      if (!cartData.cart.length) { window.location.href = '/cart'; return; }

      const delivery = cartData.total >= 500000 ? 0 : 15000;
      const grandTotal = cartData.total + delivery;

      document.getElementById('checkout-content').innerHTML =
        '<div>' +
        '<div class="checkout-form">' +
        '<div class="checkout-section-title">Contact Information</div>' +
        '<div class="form-grid">' +
        '<div class="form-field"><label class="form-label">First Name *</label><input class="form-input" type="text" id="firstName" placeholder="John"></div>' +
        '<div class="form-field"><label class="form-label">Last Name *</label><input class="form-input" type="text" id="lastName" placeholder="Doe"></div>' +
        '</div>' +
        '<div class="form-field"><label class="form-label">Email Address *</label><input class="form-input" type="email" id="email" placeholder="you@example.com"></div>' +
        '<div class="form-field"><label class="form-label">Phone Number *</label><input class="form-input" type="tel" id="phone" placeholder="08012345678"></div>' +
        '<div class="checkout-section-title" style="margin-top:32px">Delivery Address</div>' +
        '<div class="form-field"><label class="form-label">Street Address *</label><input class="form-input" type="text" id="address" placeholder="123 Example Street"></div>' +
        '<div class="form-grid">' +
        '<div class="form-field"><label class="form-label">City *</label><input class="form-input" type="text" id="city" placeholder="Lagos"></div>' +
        '<div class="form-field"><label class="form-label">State *</label>' +
        '<select class="form-input" id="state"><option value="">Select State</option><option>Lagos</option><option>Abuja</option><option>Ogun</option><option>Oyo</option><option>Rivers</option><option>Kano</option><option>Delta</option><option>Anambra</option><option>Enugu</option><option>Kaduna</option><option>Akwa Ibom</option><option>Edo</option><option>Osun</option><option>Ondo</option><option>Other</option></select>' +
        '</div></div>' +
        '<div class="checkout-section-title" style="margin-top:32px">Payment Method</div>' +
        '<div class="payment-methods">' +
        '<label class="payment-option selected" onclick="selectPayment(this)">' +
        '<input type="radio" name="payment" value="bank-transfer" checked>' +
        '<div><div class="payment-option-label">Bank Transfer</div><div class="payment-option-desc">Transfer to our account. Order confirmed after verification.</div></div>' +
        '</label>' +
        '<label class="payment-option" onclick="selectPayment(this)">' +
        '<input type="radio" name="payment" value="pay-on-delivery">' +
        '<div><div class="payment-option-label">Pay on Delivery</div><div class="payment-option-desc">Cash or POS on delivery. Lagos only.</div></div>' +
        '</label>' +
        '<label class="payment-option" onclick="selectPayment(this)">' +
        '<input type="radio" name="payment" value="paystack">' +
        '<div><div class="payment-option-label">Online Payment (Paystack)</div><div class="payment-option-desc">Pay securely with card, bank, or USSD.</div></div>' +
        '</label>' +
        '</div>' +
        '<button class="btn btn-gold btn-full btn-lg" style="margin-top:32px" onclick="placeOrder()" id="place-btn">Place Order</button>' +
        '</div></div>' +
        '<div class="checkout-order-summary">' +
        '<div class="cart-summary-title">Order Summary</div>' +
        cartData.cart.map(function(item) {
          return '<div class="checkout-item-row">' +
            '<div class="checkout-item-img" style="position:relative">' +
            '<img src="' + item.image + '" alt="' + item.name + '" style="width:100%;height:100%;object-fit:cover">' +
            '<span class="checkout-item-qty-badge">' + item.qty + '</span>' +
            '</div>' +
            '<div class="checkout-item-name">' + item.name + '</div>' +
            '<div class="checkout-item-price">' + formatPrice(item.price * item.qty) + '</div>' +
            '</div>';
        }).join('') +
        '<div style="margin-top:20px">' +
        '<div class="summary-row"><span>Subtotal</span><span>' + formatPrice(cartData.total) + '</span></div>' +
        '<div class="summary-row"><span>Delivery</span><span>' + (delivery === 0 ? '<span style="color:var(--success)">Free</span>' : formatPrice(delivery)) + '</span></div>' +
        '<div class="summary-row total"><span>Total</span><span>' + formatPrice(grandTotal) + '</span></div>' +
        '</div>' +
        '<div style="background:rgba(184,147,63,0.06);border:1px solid rgba(184,147,63,0.2);padding:16px;margin-top:20px">' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Bank Transfer Details</div>' +
        '<div style="font-size:13px;color:var(--mid);line-height:1.8">Bank: <strong>First Bank</strong><br>Account: <strong>1234567890</strong><br>Name: <strong>Sixth Column Limited</strong></div>' +
        '</div>' +
        '</div>';
    }

    function selectPayment(el) {
      document.querySelectorAll('.payment-option').forEach(function(o) { o.classList.remove('selected'); });
      el.classList.add('selected');
      el.querySelector('input[type=radio]').checked = true;
    }

    async function placeOrder() {
      var firstName = document.getElementById('firstName').value.trim();
      var lastName = document.getElementById('lastName').value.trim();
      var email = document.getElementById('email').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var address = document.getElementById('address').value.trim();
      var city = document.getElementById('city').value.trim();
      var state = document.getElementById('state').value;
      var paymentMethod = document.querySelector('input[name="payment"]:checked').value;

      if (!firstName || !email || !phone || !address || !city || !state) {
        showToast('Please fill in all required fields', 'error'); return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('Please enter a valid email', 'error'); return;
      }

      var btn = document.getElementById('place-btn');
      btn.textContent = 'Placing Order...';
      btn.disabled = true;

      try {
        var res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email, phone, address, city, state, paymentMethod })
        });
        var data = await res.json();
        if (data.success) {
          // Open WhatsApp notification for the business owner
          if (data.waLink) {
            window.open(data.waLink, '_blank');
          }
          window.location.href = '/order-confirmation?orderId=' + data.orderId;
        } else {
          showToast(data.error || 'Failed to place order', 'error');
          btn.textContent = 'Place Order';
          btn.disabled = false;
        }
      } catch (e) {
        showToast('Network error. Please try again.', 'error');
        btn.textContent = 'Place Order';
        btn.disabled = false;
      }
    }

    loadCheckout();
  </script>
</body>
</html>
